description: >-
  KPMG has no public developer API at the network level and no
  metered billing surface for a KPMG-branded developer product.
  Costs flow through audit, assurance, tax, legal, advisory, ESG, or
  AI engagement contracts and appear on client books as
  professional-services spend, not as a metered API invoice. KPMG
  itself runs FinOps and cloud financial-management practices for
  clients on hyperscaler spend, but does not consume FinOps for its
  own corporate offerings. KPMG Origins, the one product-priced
  KPMG-branded API surface, bills under its operator /
  software-provider agreement and not through a public per-call
  meter.
notes: >-
  No public developer API — placeholder. KPMG FinOps is an advisory
  offering, not a billed KPMG product. KPMG Origins billing is
  product-agreement-based, not metered.
