meters:
  - name: engagement_contract
    description: >-
      Master engagement contract — not a metered unit; costs flow
      through time-and-materials, fixed-fee, or
      managed-services-subscription invoicing from the relevant KPMG
      member firm.
    unit: contract
    aggregation: count
    dimensions:
      - client
      - member_firm
      - service_line
  - name: origins_contract
    description: >-
      KPMG Origins operator / software-provider contract — billed
      under the product agreement, not metered through a public
      per-call meter.
    unit: contract
    aggregation: count
    dimensions:
      - operator
      - jurisdiction
principles:
  - name: Visibility
    description: >-
      Track KPMG cost as professional-services spend on the client
      GL, not as a metered API line.
  - name: Allocation
    description: >-
      Allocate engagement cost to the sponsoring business unit;
      pass-through hyperscaler costs incurred during a KPMG
      managed-services arrangement should be allocated through the
      underlying cloud bill rather than the KPMG invoice.
  - name: Optimization
    description: >-
      Optimize by aligning engagement scope with the FinOps practices
      KPMG itself promotes to clients for hyperscaler workloads,
      ensuring scope-creep does not erode engagement value.
  - name: Accountability
    description: >-
      Engagement sponsor on the client side and the KPMG engagement
      partner share accountability for cost and value delivered.
