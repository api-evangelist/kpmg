apis:
  - name: KPMG Origins (IWTS)
    description: >-
      KPMG Origins is the public-facing platform implementing the NSW
      Integrated Waste Tracking System (IWTS) and is the single discoverable
      public REST API surface inside the KPMG brand. It exposes two APIs —
      Movements (waste-movement reporting) and Registries (organisations
      and locations) — over Swagger, with API-key authentication generated
      by operators in their account settings. The system supports waste
      reporting automation and regulatory reporting for industry
      participants and software providers integrating waste data from
      their existing tooling, with the explicit goal of eliminating
      double-entry of regulatory data. NSW is currently operational with
      Queensland and additional Australian jurisdictions in scope.
    humanURL: https://help.kpmgorigins.com/en/articles/1850-integrating-with-origins
    baseURL: https://app.kpmgorigins.com/client-api/
    tags:
