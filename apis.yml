aid: kpmg
name: KPMG
description: >-
  KPMG is one of the Big Four professional services organizations, operating
  through a global network of independent member firms affiliated with KPMG
  International Limited, a private English company limited by guarantee that
  itself does not provide services to clients. The network spans more than
  276,000 partners and employees across 138 countries and territories.
  KPMG organizes delivery across six service lines — Audit & Assurance,
  Tax, Legal, Advisory, ESG, and AI — and serves six industries: Consumer
  / Retail / Leisure; Energy, Natural Resources & Chemicals; Financial
  Services; Healthcare; Government & Public Sector; and Private Enterprise.
  AI is a first-class service line built on the KPMG Trusted AI framework
  — a ten-pillar approach covering Reliability, Security, Safety, Privacy,
  Sustainability, Explainability, Integrity, Transparency, Fairness, and
  Accountability — and packaged through five AI solutions: KPMG AI
  Jumpstart, AI Strategy, AI Trust, AI Workforce, and AI Technology.
  Alliances anchoring the AI delivery surface include Microsoft, Oracle,
  Salesforce, SAP, ServiceNow, and Workday, with collaboration noted with
  the World Economic Forum. KPMG Lakehouse, the firm's USD 450 million
  learning-and-innovation campus in Lake Nona, Orlando, is the cultural and
  AI-upskilling hub for the US firm and a venue for client innovation
  sessions in generative AI, ESG, and talent strategy. Insights is KPMG's
  research-publishing surface, organized across topic categories including
  AI and Technology, ESG, Operations, Risk and Regulation, Transformation,
  Value Creation, Workforce, Public Policy & Regulatory Change, Business
  Transformation, Audit & Assurance, Tax, Advisory, Sustainability, and
  Transactions, with flagship series such as the KPMG US Technology
  Survey Report, the KPMG Global Third-Party Risk Management Survey, the
  KPMG M&A Deal Market Study, Fit for Pillar Two, and AI Governance
  Principles for Boards. KPMG does not publish a public developer API or
  corporate developer portal at the network level; the firm has no
  enumerable public GitHub organization at `github.com/kpmg`. The one
  meaningful public API surface inside the KPMG brand is KPMG Origins
  (`kpmgorigins.com`) — an Australian regulated-waste tracking platform
  (initially the NSW Integrated Waste Tracking System / IWTS, with
  Queensland and other jurisdictions in scope) that exposes two REST APIs
  (Movements + Registries) over Swagger with API-key authentication,
  intended for integration with waste-operator software rather than as a
  general-purpose KPMG developer surface. Distribution to readers and
  client stakeholders flows through the Insights site, the US Subscription
  Center (Opportunity (In)sight monthly newsletter), KPMG Australia's
  Business Insights podcast, and per-page RSS feeds offered on individual
  KPMG member-firm pages.
